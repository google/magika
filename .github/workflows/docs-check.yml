name: Docs - Check documentation

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request:
    paths:
      - "*.md"
      - "assets/**/*.md"
      - "docs/**/*.md"
      - "js/**/*.md"
      - "python/**/*.md"
      - "rust/**/*.md"
      - "website-ng/**/*.md"
  schedule:
    - cron: "42 7 * * 4" # Run weekly

permissions:
  contents: read

jobs:
  run-check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.5.22/install.sh | sh

      - name: "Run check_documentation.py script"
        working-directory: python
        run: uv run ./scripts/check_documentation.py
